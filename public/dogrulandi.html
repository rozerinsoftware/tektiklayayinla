<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>E-posta onaylandı — Tek Tıkla Yayınla</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #2563eb 0%, #1d4ed8 100%);
      color: #1a1a1a;
      padding: 24px;
    }
    .kart {
      background: #fff;
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .ikon { font-size: 48px; margin-bottom: 12px; }
    h1 { font-size: 22px; margin: 0 0 12px; color: #1a1a1a; }
    p { font-size: 15px; line-height: 1.55; color: #6b7280; margin: 0 0 20px; }
    .btn {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 16px;
    }
    .not { font-size: 13px; color: #9ca3af; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="kart">
    <div class="ikon">✓</div>
    <h1>E-posta adresiniz onaylandı</h1>
    <p>Artık Tek Tıkla Yayınla uygulamasına dönüp <strong>Giriş yap</strong> ile devam edebilirsiniz.</p>
    <a class="btn" id="uygulamaAc" href="tektiklayayinla://email-dogrulandi">Uygulamayı aç</a>
    <p class="not">Uygulama açılmazsa mağazadan yüklediğiniz sürümü elle açın ve giriş yapın.</p>
  </div>
  <script>
    (function () {
      var link = document.getElementById('uygulamaAc');
      try {
        window.location.href = 'tektiklayayinla://email-dogrulandi';
      } catch (e) {}
      setTimeout(function () {
        if (document.hidden) return;
        link.focus();
      }, 800);
    })();
  </script>
</body>
</html>
